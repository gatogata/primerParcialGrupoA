{% extends 'base.html' %}

{% block content %}

<h2>Agregar Producto</h2>

<form method="POST" enctype="multipart/form-data" class="card form-card">

    <input type="text" name="name" class="form-control mb-3" placeholder="Nombre" required>

    <input type="number" step="0.01" name="price" class="form-control mb-3" placeholder="Precio" required>

    <input type="number" name="stock" class="form-control mb-3" placeholder="Stock" required>

    <input type="file" name="image" class="form-control mb-3">

    <button class="btn btn-primary">Guardar</button>

</form>

{% endblock %}
