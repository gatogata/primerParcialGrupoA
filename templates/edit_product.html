{% extends 'base.html' %}

{% block content %}

<h2>Editar Producto</h2>

<form method="POST" enctype="multipart/form-data" class="card form-card">

    <input type="text" name="name" value="{{ product.name }}" class="form-control mb-3">

    <input type="number" step="0.01" name="price" value="{{ product.price }}" class="form-control mb-3">

    <input type="number" name="stock" value="{{ product.stock }}" class="form-control mb-3">

    <input type="file" name="image" class="form-control mb-3">

    <button class="btn btn-success">Actualizar</button>

</form>

{% endblock %}
